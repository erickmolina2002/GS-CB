name: Security Lint (DevSecOps)

on:
  push:
    branches: [main, main2]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eslint-security:
    name: Lint de Segurança
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: API
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: API/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Rodar lint de segurança
        run: npm run lint:security

      - name: Análise de dependências (informativo)
        if: always()
        run: npm audit --audit-level=high || true
  semgrep-sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep
        run: |
          semgrep scan \
            --config p/javascript \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --error \
            API
